opencollection: 1.0.0

info:
  name: E-Commerce API Burno
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  variables:
    - name: base_URL
      value: http://localhost:9999/api
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
